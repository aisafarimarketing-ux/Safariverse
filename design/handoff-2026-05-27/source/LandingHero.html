<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SafariVerse — Three Editions, One Universe</title>
<link rel="stylesheet" href="editorial.css" />
<style>
  /* ============ PAGE ============ */
  body { background: var(--paper-cream); color: var(--ink-deep); overflow-x: hidden; }

  /* ============ TOP BAR (paper variant) ============ */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 22px 40px;
    transition: background 400ms var(--ease-out), backdrop-filter 400ms var(--ease-out);
  }
  .topbar.is-scrolled {
    background: rgba(245,241,234,0.94);
    backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--divider-light);
    padding: 14px 40px;
  }
  .topbar__left { display: flex; align-items: center; gap: 14px; }
  .wordmark {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 22px;
    letter-spacing: 0.02em;
    color: var(--ink-deep);
    text-decoration: none;
  }
  .wordmark sup {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--ember);
    margin-left: 6px;
    vertical-align: super;
  }
  .topbar__nav { display: flex; gap: 32px; align-items: center; justify-content: center; }
  .topbar__link {
    color: var(--ink-muted);
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    text-decoration: none;
    font-weight: 500;
  }
  .topbar__link:hover { color: var(--ink-deep); }
  .topbar__right { display: flex; gap: 12px; align-items: center; justify-content: flex-end; }
  .topbar__icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid var(--divider-light);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--ink-deep);
    background: transparent;
  }
  .topbar__avatar {
    width: 36px; height: 36px; border-radius: 50%;
    background: url('https://images.unsplash.com/photo-1531123897727-8f129e1688ce?w=200&q=80') center/cover;
    border: 1px solid var(--divider-light);
  }

  /* ============ HERO STAGE — fills viewport ============ */
  .hero-stage {
    min-height: 100vh;
    padding-top: 64px; /* clear fixed topbar */
    display: flex;
    flex-direction: column;
    background: var(--paper-cream);
  }
  .hero-strip {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: baseline;
    padding: 14px 32px 12px;
    border-bottom: 0.5px solid var(--divider-light);
    gap: 24px;
  }
  .hero-strip__l { display: flex; align-items: baseline; gap: 16px; }
  .hero-strip__eyebrow {
    color: var(--ember-stamp);
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .hero-strip__eyebrow::before {
    content: '';
    display: inline-block;
    width: 24px; height: 1px;
    background: var(--ember-stamp);
  }
  .hero-strip__title {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 18px;
    color: var(--ink-deep);
    letter-spacing: -0.005em;
  }
  .hero-strip__sub {
    text-align: center;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 14px;
    color: var(--ink-body);
  }
  .hero-strip__r {
    display: flex;
    justify-content: flex-end;
  }
  .ghost-link {
    color: var(--ink-deep);
    text-decoration: none;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--ink-deep);
    padding-bottom: 3px;
    transition: opacity 200ms;
  }
  .ghost-link:hover { opacity: 0.55; }

  /* ============ HERO GRID (3 EDITION CARDS, viewport-filling) ============ */
  .hero-grid {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    padding: 6px;
    background: var(--paper-cream);
  }

  /* ============ EDITION HERO CARD — fills its grid cell ============ */
  .ehc {
    position: relative;
    height: 100%;
    min-height: 0;       /* needed for grid children */
    background: var(--paper-aged);
    overflow: hidden;
    cursor: pointer;
    transition: transform 600ms var(--ease-out), box-shadow 600ms var(--ease-out);
  }
  .ehc:hover:not(.is-open) {
    transform: translateY(-2px);
  }
  .ehc:hover:not(.is-open) .ehc__photo {
    transform: scale(1.03);
  }
  .ehc.is-open {
    cursor: default;
    background: var(--paper-cream);
    box-shadow: 0 24px 60px rgba(0,0,0,0.18), 0 8px 16px rgba(0,0,0,0.12);
    z-index: 5;
  }

  /* ---- POSTER FACE ---- */
  .ehc__face {
    position: absolute; inset: 0;
    opacity: 1;
    transition: opacity 350ms var(--ease-out);
  }
  .ehc.is-open .ehc__face { opacity: 0; pointer-events: none; }

  .ehc__photo {
    position: absolute; inset: 0;
    background-size: cover;
    background-position: center;
    transition: transform 1200ms var(--ease-out);
  }
  .ehc__frame {
    position: absolute; inset: 14px;
    border: 1px solid rgba(245,241,234,0.6);
    pointer-events: none;
  }
  .ehc__scrim {
    position: absolute; inset: 0;
    background: linear-gradient(180deg,
      rgba(15,14,12,0.30) 0%,
      rgba(15,14,12,0) 30%,
      rgba(15,14,12,0) 55%,
      rgba(15,14,12,0.78) 100%);
  }
  .ehc__face-inner {
    position: absolute; inset: 14px;
    padding: 32px 36px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    color: var(--ink-bright);
  }
  .ehc__masthead {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: rgba(245,241,234,0.85);
  }
  .ehc__masthead .ember { color: var(--ember-soft); }
  .ehc__bottom { display: flex; flex-direction: column; gap: 10px; }
  .ehc__title {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-variation-settings: 'opsz' 144;
    font-size: clamp(32px, 3.6vw, 56px);
    line-height: 1.02;
    letter-spacing: -0.005em;
    color: var(--ink-bright);
    margin: 0;
  }
  .ehc__rule {
    width: 48px; height: 1px;
    background: var(--ink-bright);
    opacity: 0.7;
  }
  .ehc__meta {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 13px;
    color: rgba(245,241,234,0.85);
  }
  .ehc__hint {
    position: absolute;
    bottom: 36px;
    right: 36px;
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: rgba(245,241,234,0.65);
    transition: opacity 300ms, transform 300ms;
  }
  .ehc:hover:not(.is-open) .ehc__hint {
    color: var(--ember-soft);
    transform: translateX(2px);
  }

  /* ---- OPEN FACE — DAY SPREAD INSIDE CARD ---- */
  .ehc__open {
    position: absolute; inset: 0;
    opacity: 0;
    pointer-events: none;
    transition: opacity 400ms var(--ease-out);
    background: var(--paper-cream);
    display: flex;
    flex-direction: column;
  }
  .ehc.is-open .ehc__open {
    opacity: 1;
    pointer-events: auto;
  }
  .ehc__open-pad {
    padding: 32px 40px 24px;
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow-y: auto;
  }

  /* open header row: ordinal + close */
  .ehc__open-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 6px;
  }
  .ehc__ordinal {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-variation-settings: 'opsz' 144;
    font-size: clamp(72px, 6vw, 108px);
    line-height: 0.9;
    color: var(--ember-stamp);
    letter-spacing: -0.02em;
    font-variant-numeric: tabular-nums;
  }
  .ehc__day-eyebrow {
    margin-top: 4px;
    color: var(--ember-stamp);
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
  }
  .ehc__close {
    width: 28px; height: 28px; border-radius: 50%;
    border: 1px solid var(--divider-light);
    background: transparent;
    color: var(--ink-deep);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    line-height: 1;
    transition: background 200ms, color 200ms;
  }
  .ehc__close:hover {
    background: var(--ink-deep);
    color: var(--paper-cream);
  }
  .ehc__day-acacia {
    width: 48px; height: 1px;
    background: var(--acacia-rule);
    margin: 8px 0 12px;
  }
  .ehc__day-title {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-variation-settings: 'opsz' 144;
    font-size: clamp(28px, 2.6vw, 40px);
    line-height: 1.05;
    color: var(--ink-deep);
    margin: 0 0 4px;
  }
  .ehc__day-sub {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 15px;
    color: var(--ink-body);
    margin: 0 0 18px;
  }

  .ehc__day-photo {
    aspect-ratio: 16 / 9;
    background-size: cover;
    background-position: center;
    margin-bottom: 6px;
  }
  .ehc__day-caption {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 10px;
  }
  .ehc__day-narrative {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 400;
    line-height: 1.6;
    color: var(--ink-body);
    margin: 0 0 16px;
  }

  .ehc__lodge {
    border-top: 1px solid var(--divider-light);
    padding-top: 8px;
    margin-bottom: 10px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .ehc__lodge-eye {
    color: var(--ember-stamp);
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .ehc__lodge-name {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 14px;
    color: var(--ink-deep);
  }
  .ehc__lodge-loc {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 11px;
    color: var(--ink-body);
  }

  /* compact Sources & Attribution panel (2-col inside card) */
  .ehc__attr {
    background: var(--canvas-sand);
    border-left: 2px solid var(--ember);
    padding: 10px 12px 12px;
    margin-bottom: 12px;
  }
  .ehc__attr-head {
    display: flex; align-items: center; gap: 6px;
    margin-bottom: 8px;
  }
  .ehc__attr-mark {
    color: var(--ember);
    font-size: 10px;
  }
  .ehc__attr-title {
    color: var(--ember-stamp);
    font-family: 'Inter', sans-serif;
    font-size: 8.5px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
  }
  .ehc__attr-rule {
    flex: 1; height: 1px;
    background: var(--acacia-rule);
    opacity: 0.55;
  }
  .ehc__attr-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .ehc__attr-col-eye {
    font-family: 'Inter', sans-serif;
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 4px;
  }
  .ehc__attr-credit {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    color: var(--ink-deep);
    line-height: 1.3;
  }
  .ehc__attr-credit em {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    color: var(--ink-body);
    font-size: 10.5px;
    margin-left: 2px;
  }
  .ehc__attr-review {
    display: flex; align-items: center; gap: 5px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: var(--ink-body);
    margin-bottom: 2px;
  }
  .ehc__attr-review .score {
    color: var(--ember-stamp);
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 12px;
  }
  .ehc__attr-review .stars {
    color: var(--ember);
    letter-spacing: 0.1em;
    font-size: 9px;
  }
  .ehc__attr-review .count {
    color: var(--ink-muted);
    font-size: 9px;
  }

  /* footer of open card: pager + open-in-full */
  .ehc__foot {
    margin-top: auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 10px;
    border-top: 0.5px solid var(--divider-light);
  }
  .ehc__pager {
    display: flex; align-items: center; gap: 10px;
  }
  .ehc__pager-btn {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1px solid var(--divider-light);
    background: transparent;
    color: var(--ink-deep);
    cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 12px;
    line-height: 1;
    transition: background 200ms, color 200ms;
  }
  .ehc__pager-btn:hover:not(:disabled) {
    background: var(--ink-deep);
    color: var(--paper-cream);
  }
  .ehc__pager-btn:disabled { opacity: 0.3; cursor: default; }
  .ehc__pager-count {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
    font-variant-numeric: tabular-nums;
  }
  .ehc__full-link {
    color: var(--ember-stamp);
    text-decoration: none;
    font-family: 'Inter', sans-serif;
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--ember-stamp);
    padding-bottom: 2px;
    transition: color 200ms, border-color 200ms;
  }
  .ehc__full-link:hover {
    color: var(--ember);
    border-color: var(--ember);
  }

  /* slim caption strip below the hero stage */
  .hero-foot {
    padding: 14px 32px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--paper-cream);
    border-top: 0.5px solid var(--divider-light);
    gap: 24px;
  }
  .hero-foot__l {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-muted);
  }
  .hero-foot__r {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 13px;
    color: var(--ink-body);
  }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 1024px) {
    .hero-grid { grid-template-columns: 1fr 1fr; }
    .hero-strip { grid-template-columns: 1fr 1fr; }
    .hero-strip__sub { display: none; }
  }
  @media (max-width: 700px) {
    .hero-stage { padding-top: 56px; }
    .hero-grid { grid-template-columns: 1fr; }
    .hero-strip { grid-template-columns: 1fr; gap: 6px; padding: 12px 20px; }
    .hero-strip__r { justify-content: flex-start; }
    .hero-foot { flex-direction: column; gap: 6px; align-items: flex-start; padding: 12px 20px 16px; }
    .topbar { padding: 14px 20px; grid-template-columns: 1fr auto; }
    .topbar__nav { display: none; }
    /* on phones each card occupies one full viewport for snap-scroll feel */
    .ehc { min-height: calc(100vh - 56px - 90px); }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script>

<script type="text/babel">
  const { useState, useEffect, useRef } = React;
  const ROOT = ReactDOM.createRoot(document.getElementById('root'));

  function TopBar() {
    const [scrolled, setScrolled] = useState(false);
    useEffect(() => {
      const onScroll = () => setScrolled(window.scrollY > 40);
      window.addEventListener('scroll', onScroll, { passive: true });
      return () => window.removeEventListener('scroll', onScroll);
    }, []);
    return (
      <header className={`topbar ${scrolled ? 'is-scrolled' : ''}`}>
        <div className="topbar__left">
          <a href="#" className="wordmark">SafariVerse<sup>✦</sup></a>
        </div>
        <nav className="topbar__nav">
          <a href="#" className="topbar__link">Editions</a>
          <a href="#" className="topbar__link">Storytellers</a>
          <a href="#" className="topbar__link">Destinations</a>
          <a href="#" className="topbar__link">Studio</a>
        </nav>
        <div className="topbar__right">
          <button className="topbar__icon" aria-label="Search">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          </button>
          <div className="topbar__avatar" aria-label="Account" />
        </div>
      </header>
    );
  }

  function ReviewLine({ r }) {
    const stars = '★'.repeat(Math.round(r.score));
    return (
      <div className="ehc__attr-review">
        <span style={{ fontWeight: 600 }}>{r.platform}</span>
        <span className="score">{r.score.toFixed(1)}</span>
        <span className="stars">{stars}</span>
        <span className="count">({r.count.toLocaleString()})</span>
      </div>
    );
  }

  function EditionHeroCard({ edition }) {
    const [open, setOpen] = useState(false);
    const [idx, setIdx] = useState(0);
    const cardRef = useRef(null);

    const days = edition.days;
    const day = days[idx];

    /* ESC closes; ← → paginate when open */
    useEffect(() => {
      if (!open) return;
      const onKey = (e) => {
        if (e.key === 'Escape') { setOpen(false); return; }
        if (e.key === 'ArrowRight' && idx < days.length - 1) setIdx(idx + 1);
        if (e.key === 'ArrowLeft' && idx > 0) setIdx(idx - 1);
      };
      window.addEventListener('keydown', onKey);
      return () => window.removeEventListener('keydown', onKey);
    }, [open, idx, days.length]);

    return (
      <article
        ref={cardRef}
        className={`ehc ${open ? 'is-open' : ''}`}
        onClick={() => { if (!open) setOpen(true); }}
      >
        {/* CLOSED FACE — Atlas-Poster preview */}
        <div className="ehc__face">
          <div className="ehc__photo" style={{ backgroundImage: `url(${edition.hero})` }} />
          <div className="ehc__scrim" />
          <div className="ehc__frame" />
          <div className="ehc__face-inner">
            <div className="ehc__masthead">
              <span><span className="ember">✦</span> Edition {edition.number}</span>
              <span>{edition.label}</span>
            </div>
            <div className="ehc__bottom">
              <h3 className="ehc__title">{edition.title}</h3>
              <div className="ehc__rule" />
              <div className="ehc__meta">{edition.meta}</div>
            </div>
          </div>
          <div className="ehc__hint">Open ↗</div>
        </div>

        {/* OPEN FACE — Day spread inside the card */}
        <div className="ehc__open" onClick={(e) => e.stopPropagation()}>
          <div className="ehc__open-pad">
            <div className="ehc__open-head">
              <div>
                <div className="ehc__ordinal">{day.n}</div>
                <div className="ehc__day-eyebrow">Day {parseInt(day.n, 10)} · {edition.label}</div>
              </div>
              <button className="ehc__close" aria-label="Close" onClick={() => setOpen(false)}>×</button>
            </div>
            <div className="ehc__day-acacia" />
            <h4 className="ehc__day-title">{day.title}</h4>
            <div className="ehc__day-sub">{day.sub}</div>

            <div className="ehc__day-photo" style={{ backgroundImage: `url(${day.photo})` }} />
            <div className="ehc__day-caption">{day.photo_caption}</div>

            <p className="ehc__day-narrative">{day.narrative}</p>

            <div className="ehc__lodge">
              <div className="ehc__lodge-eye">The Lodge</div>
              <div className="ehc__lodge-name">{day.lodge.name}</div>
              <div className="ehc__lodge-loc">{day.lodge.location}</div>
            </div>

            <div className="ehc__attr">
              <div className="ehc__attr-head">
                <span className="ehc__attr-mark">✦</span>
                <span className="ehc__attr-title">Sources &amp; Attribution</span>
                <span className="ehc__attr-rule" />
              </div>
              <div className="ehc__attr-grid">
                <div>
                  <div className="ehc__attr-col-eye">Credit</div>
                  <div className="ehc__attr-credit">
                    {day.credit_name}
                    <em>· {day.credit_platform}</em>
                  </div>
                  <div className="ehc__attr-credit" style={{ marginTop: 4, color: 'var(--ink-muted)', fontSize: 9.5, letterSpacing: '0.16em', textTransform: 'uppercase', fontWeight: 600 }}>
                    {day.credit_role}
                  </div>
                </div>
                <div>
                  <div className="ehc__attr-col-eye">Travellers Say</div>
                  {day.reviews.map((r, i) => <ReviewLine key={i} r={r} />)}
                </div>
              </div>
            </div>

            <div className="ehc__foot">
              <div className="ehc__pager">
                <button
                  className="ehc__pager-btn"
                  onClick={() => setIdx(Math.max(0, idx - 1))}
                  disabled={idx === 0}
                  aria-label="Previous day"
                >‹</button>
                <div className="ehc__pager-count">
                  {String(idx + 1).padStart(2,'0')} / {String(days.length).padStart(2,'0')}
                </div>
                <button
                  className="ehc__pager-btn"
                  onClick={() => setIdx(Math.min(days.length - 1, idx + 1))}
                  disabled={idx === days.length - 1}
                  aria-label="Next day"
                >›</button>
              </div>
              <a className="ehc__full-link" href={`Edition.html?slug=${edition.id}`}>
                Open in full page →
              </a>
            </div>
          </div>
        </div>
      </article>
    );
  }

  function App() {
    return (
      <>
        <TopBar />

        <section className="hero-stage">
          <div className="hero-strip">
            <div className="hero-strip__l">
              <span className="hero-strip__eyebrow">This week's editions</span>
              <span className="hero-strip__title">Where the wild ones whisper.</span>
            </div>
            <div className="hero-strip__sub">Three editions, three lenses. Open one.</div>
            <div className="hero-strip__r">
              <a href="#" className="ghost-link">All editions →</a>
            </div>
          </div>

          <div className="hero-grid">
            {window.EDITIONS.map((e) => (
              <EditionHeroCard key={e.id} edition={e} />
            ))}
          </div>
        </section>

        <section className="hero-foot">
          <div className="hero-foot__l">Twelve days, four dreams, one journey.</div>
          <div className="hero-foot__r">Click a card to preview a day · <em>Open in full page</em> to live the whole edition.</div>
        </section>
      </>
    );
  }

  ROOT.render(<App />);
</script>

</body>
</html>
