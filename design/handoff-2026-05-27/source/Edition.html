<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Honeymoon in Kenya · SafariVerse Edition 01</title>
<link rel="stylesheet" href="editorial.css" />
<style>
  /* ============ APP CHROME ============ */
  body { background: var(--paper-cream); overflow-x: hidden; }
  .app.dark { background: var(--canvas-deep); }
  .app[data-mode="poster"]  { background: var(--canvas-night); }
  .app[data-mode="lookbook"] { background: #050505; }
  .ed-main { min-height: 100vh; }

  .ed-top {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    padding: 18px 32px;
    background: rgba(245,241,234,0.0);
    transition: background 400ms var(--ease-out), backdrop-filter 400ms var(--ease-out), border 400ms var(--ease-out);
    color: var(--ink-deep);
    border-bottom: 1px solid transparent;
  }
  .ed-top.is-shrunk {
    background: rgba(245,241,234,0.94);
    backdrop-filter: blur(14px);
    border-bottom-color: var(--divider-light);
    padding: 12px 32px;
  }
  .ed-top.is-dark { color: var(--ink-bright); }
  .ed-top.is-dark.is-shrunk {
    background: rgba(15,14,12,0.85);
    border-bottom-color: var(--divider-dark);
  }
  .ed-top.is-dark:not(.is-shrunk) {
    background: linear-gradient(180deg, rgba(15,14,12,0.55), rgba(15,14,12,0));
  }
  .ed-top__left { display: flex; align-items: center; gap: 16px; }
  .ed-top__back {
    width: 32px; height: 32px; border-radius: 50%;
    display: inline-flex; align-items: center; justify-content: center;
    color: currentColor;
    border: 1px solid currentColor;
    text-decoration: none;
    opacity: 0.7;
    transition: opacity 200ms;
  }
  .ed-top__back:hover { opacity: 1; }
  .ed-top__wordmark {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 18px;
    color: currentColor;
    text-decoration: none;
    letter-spacing: 0.01em;
  }
  .ed-top__wordmark sup {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 0.2em;
    color: var(--ember);
    margin-left: 4px;
    vertical-align: super;
  }
  .ed-top__sep { opacity: 0.4; }
  .ed-top__crumb {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.7;
  }
  .ed-top__right { display: flex; gap: 8px; justify-content: flex-end; align-items: center; }
  .ed-top__icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid transparent;
    background: transparent;
    color: currentColor;
    opacity: 0.7;
    display: inline-flex; align-items: center; justify-content: center;
    transition: background 200ms, opacity 200ms;
  }
  .ed-top__icon:hover { opacity: 1; background: rgba(0,0,0,0.06); }
  .ed-top.is-dark .ed-top__icon:hover { background: rgba(245,241,234,0.08); }

  .ed-sticky-cta {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%);
    z-index: 90;
    display: flex; align-items: center;
    padding: 8px 8px 8px 24px;
    background: rgba(15,14,12,0.92);
    border-radius: 9999px;
    color: var(--ink-bright);
    backdrop-filter: blur(14px);
    border: 1px solid var(--divider-dark);
    animation: fadeUp 400ms var(--ease-out) both;
  }
  .ed-sticky-cta .caption { color: var(--ink-soft); }
  @keyframes fadeUp {
    from { opacity: 0; transform: translate(-50%, 12px); }
    to   { opacity: 1; transform: translate(-50%, 0); }
  }

  /* ===================================================================
     SCROLL-STORY (READ MODE)
     =================================================================== */
  .ss { background: var(--paper-cream); padding-bottom: 64px; }

  .ss__hero { position: relative; height: 100vh; min-height: 720px; overflow: hidden; background: #000; }
  .ss__hero-photo { position: absolute; inset: -8% -2%; background-size: cover; background-position: center; will-change: transform; }
  .ss__hero-scrim {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(15,14,12,0.5) 0%, rgba(15,14,12,0) 30%, rgba(15,14,12,0) 60%, rgba(245,241,234,0.55) 96%, var(--paper-cream) 100%);
  }
  .ss__hero-caption {
    position: absolute; left: 40px; bottom: 80px; z-index: 2;
    color: var(--ink-bright);
    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
    display: flex; flex-direction: column; gap: 6px;
  }
  .ss__hero-credit { opacity: 0.7; }

  .ss__title {
    text-align: center;
    padding: 128px 32px 96px;
    max-width: 920px;
    margin: 0 auto;
  }
  .ss__title h1 { letter-spacing: 0.02em; }
  .ss__sub {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(20px, 2.4vw, 28px);
    color: var(--ink-body);
    margin-bottom: 36px;
  }
  .ss__byline {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-muted);
    display: inline-flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .ss__byline em { font-style: normal; color: var(--ink-deep); }
  .ss__dot { color: var(--acacia); }

  .ss__prelude {
    max-width: 720px;
    margin: 0 auto;
    padding: 64px 32px 96px;
    text-align: center;
  }
  .ss__pullquote {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(28px, 3.6vw, 44px);
    line-height: 1.25;
    color: var(--ink-deep);
    margin: 0 0 56px;
    letter-spacing: -0.01em;
  }
  .ss__body { text-align: left; max-width: 600px; margin: 0 auto; }
  .ss__terminator {
    font-family: 'Fraunces', serif;
    color: var(--ember-stamp);
    font-size: 22px;
    margin-top: 56px;
  }

  .ss__journey {
    max-width: 1000px;
    margin: 0 auto;
    padding: 64px 32px 96px;
    text-align: center;
  }
  .ss__map {
    position: relative;
    background: var(--canvas-sand);
    padding: 56px 32px 40px;
    margin-bottom: 32px;
  }
  .ss__map-svg { width: 100%; height: 120px; position: absolute; left: 0; top: 50%; transform: translateY(-50%); opacity: 0.4; }
  .ss__stops {
    position: relative;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
  }
  .ss__stop { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ss__stop-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--ember-stamp); margin-bottom: 12px; }
  .ss__stop-num {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: 30px;
    color: var(--ember-stamp);
    line-height: 1;
  }
  .ss__stop-name {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 22px;
    color: var(--ink-deep);
    letter-spacing: 0.01em;
  }
  .ss__stop-note { font-family: 'Fraunces', serif; font-style: italic; font-size: 13px; color: var(--ink-muted); }
  .ss__stop-days {
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-top: 4px;
  }
  .ss__journey-meta {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--ink-muted);
    display: inline-flex; gap: 16px; align-items: center;
    margin-top: 16px;
  }

  .ss__days {
    padding: 64px 32px 32px;
    max-width: 1280px;
    margin: 0 auto;
  }
  .ss__day {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 72px;
    padding: 72px 0;
    border-top: 0.5px solid var(--divider-light);
  }
  .ss__day:first-of-type { border-top: none; padding-top: 0; }
  .ss__day-side { position: sticky; top: 88px; align-self: start; }
  .ss__day-ordinal { font-size: 96px; }
  .ss__day-stamp {
    font-size: 10px;
    letter-spacing: 0.32em;
    color: var(--ink-deep);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .ss__day-sub {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--ink-muted);
    line-height: 1.4;
  }
  .ss__day-main { max-width: 720px; }
  .ss__day-photo {
    width: 100%;
    background-size: cover; background-position: center;
    margin-bottom: 14px;
  }
  .ss__day-caption {
    margin-bottom: 36px;
    color: var(--ink-muted);
  }
  .ss__day-lodge {
    margin-top: 36px;
    padding-top: 20px;
    border-top: 0.5px solid var(--divider-light);
  }
  .ss__day-lodge-line {
    font-family: 'Fraunces', serif;
    font-size: 18px;
    color: var(--ink-deep);
    display: inline-flex; gap: 8px; align-items: center;
    margin-top: 4px;
  }
  .ss__day-lodge-name { font-weight: 400; }
  .ss__day-inspired {
    margin-top: 20px;
    font-size: 12px;
    color: var(--ink-muted);
    display: inline-flex; gap: 8px; align-items: center;
    padding: 10px 18px;
    border: 0.5px solid var(--divider-light);
    border-radius: 9999px;
  }
  .ss__day-inspired strong { color: var(--ember-stamp); font-weight: 600; }
  .ss__source-play { color: var(--ember-stamp); font-size: 9px; }

  /* ───── Sources & Attribution — COMPACT 4-col strip ───── */
  .ss__attr {
    margin-top: 36px;
    padding: 18px 24px 22px;
    background: var(--canvas-sand);
    border-left: 2px solid var(--ember-stamp);
  }
  .ss__attr-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 16px;
  }
  .ss__attr-mark { color: var(--ember-stamp); font-size: 11px; line-height: 1; }
  .ss__attr-eyebrow {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ember-stamp);
  }
  .ss__attr-sub-eyebrow {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 9px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-muted);
    margin-bottom: 8px;
  }

  .ss__attr-grid {
    display: grid;
    grid-template-columns: 180px 200px 1fr 1.1fr;
    gap: 20px;
    align-items: start;
  }
  .ss__attr-col { min-width: 0; display: flex; flex-direction: column; text-decoration: none; color: inherit; }

  /* Compact reel column */
  .ss__attr-col--reel .ss__reel-frame {
    padding: 8px 10px;
    border-width: 0.5px;
  }
  .ss__attr-col--reel .ss__reel-screen {
    aspect-ratio: 16 / 9;
    min-height: 0;
  }
  .ss__attr-col--reel .ss__reel-overlay {
    padding: 8px 10px 10px;
    gap: 8px;
  }
  .ss__attr-col--reel .ss__reel-title {
    font-size: 12px;
    line-height: 1.2;
    max-width: none;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .ss__attr-col--reel .ss__reel-creator { font-size: 9px; }
  .ss__attr-col--reel .ss__reel-time { font-size: 9px; }
  .ss__attr-col--reel .ss__reel-live { font-size: 8px; letter-spacing: 0.2em; }
  .ss__attr-col--reel .ss__reel-play-btn {
    width: 24px; height: 24px; font-size: 10px;
  }
  .ss__attr-col--reel .ss__reel-sprocket {
    left: 6px; right: 6px;
    height: 3px;
  }
  .ss__attr-col--reel .ss__reel-sprocket--top { top: 2.5px; }
  .ss__attr-col--reel .ss__reel-sprocket--bottom { bottom: 2.5px; }
  .ss__attr-col--reel .ss__reel-sprocket span { width: 3px; height: 3px; }
  .ss__attr-col--reel .ss__reel-cap {
    margin-top: 6px;
    font-size: 9px;
    line-height: 1.3;
  }

  /* Compact blog column */
  .ss__attr-col--blog { cursor: pointer; transition: transform 300ms var(--ease-out); }
  .ss__attr-col--blog:hover { transform: translateY(-2px); }
  .ss__attr-blog-mini { background: var(--paper-cream); display: flex; flex-direction: column; }
  .ss__attr-blog-cover {
    position: relative;
    aspect-ratio: 16 / 10;
    background-size: cover; background-position: center;
    overflow: hidden;
  }
  .ss__attr-blog-tag {
    position: absolute; top: 8px; left: 8px;
    font-size: 8px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-weight: 600;
    color: var(--paper-cream);
    padding: 4px 8px;
    background: rgba(15,14,12,0.55);
    backdrop-filter: blur(4px);
  }
  .ss__attr-blog-info { padding: 10px 12px 12px; }
  .ss__attr-blog-title {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 14px;
    line-height: 1.25;
    color: var(--ink-deep);
    margin: 0 0 6px;
    letter-spacing: -0.005em;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .ss__attr-blog-meta {
    font-size: 10px;
    color: var(--ink-muted);
    letter-spacing: 0.04em;
    line-height: 1.3;
  }
  .ss__attr-blog-meta strong { color: var(--ink-deep); font-weight: 600; }

  /* Compact credits list — stacked label/value */
  .ss__credits-list { margin: 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .ss__credit {
    display: flex; flex-direction: column;
    gap: 1px;
    padding: 0;
  }
  .ss__credit dt {
    font-family: 'Inter', sans-serif;
    font-size: 8px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--ink-muted);
    margin: 0;
    line-height: 1.4;
  }
  .ss__credit dd {
    margin: 0;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: var(--ink-deep);
    line-height: 1.3;
  }
  .ss__credit-name { font-weight: 500; }
  .ss__credit-platform { font-style: italic; color: var(--ink-muted); font-weight: 400; font-size: 11px; display: block; }

  /* Compact reviews (override) */
  .ss__reviews { display: flex; flex-direction: column; gap: 6px; }
  .ss__review {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    background: var(--paper-cream);
    border: 0.5px solid var(--divider-light);
  }
  .ss__review-platform-mark {
    width: 22px; height: 22px;
    flex: 0 0 22px;
    border-radius: 50%;
    color: var(--paper-cream);
    display: inline-flex; align-items: center; justify-content: center;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 8px;
    letter-spacing: 0.04em;
  }
  .ss__review-body { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 0; }
  .ss__review-top {
    display: flex; align-items: baseline; gap: 6px;
    font-size: 10px;
  }
  .ss__review-platform {
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    color: var(--ink-deep);
    font-size: 11px;
  }
  .ss__review-score {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 13px;
    color: var(--ember-stamp);
    margin-left: auto;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .ss__review-stars {
    display: flex; align-items: center; gap: 0;
    font-size: 9px;
    color: var(--ink-muted);
    line-height: 1;
    white-space: nowrap;
  }
  .ss__star { color: var(--divider-light); font-size: 9px; line-height: 1; letter-spacing: -0.06em; }
  .ss__star.is-full { color: #D9A24F; }
  .ss__star.is-half {
    background: linear-gradient(90deg, #D9A24F 50%, var(--divider-light) 50%);
    -webkit-background-clip: text; background-clip: text;
    color: transparent;
  }
  .ss__review-count {
    margin-left: 6px;
    font-size: 9px;
    color: var(--ink-muted);
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  .ss__review-label { display: none; }
  .ss__reviews-foot {
    margin-top: 6px;
    font-size: 9px;
    color: var(--ink-muted);
    letter-spacing: 0.04em;
    font-style: italic;
  }
  .ss__reviews-foot strong { font-style: normal; color: var(--ink-body); font-weight: 500; }

  /* Reel embed — HORIZONTAL film strip, full width, minimal */
  .ss__reel { margin: 0; display: flex; flex-direction: column; }
  .ss__reel-frame {
    position: relative;
    padding: 14px 18px;
    background: var(--canvas-deep);
    border: 1px solid var(--ember-stamp);
    box-shadow: 0 8px 24px rgba(15,14,12,0.18);
  }
  .ss__reel-sprocket {
    position: absolute; left: 12px; right: 12px;
    height: 6px;
    display: flex; justify-content: space-between;
  }
  .ss__reel-sprocket--top { top: 4px; }
  .ss__reel-sprocket--bottom { bottom: 4px; }
  .ss__reel-sprocket span {
    display: block;
    width: 6px; height: 6px;
    background: var(--paper-cream);
    border-radius: 1px;
    opacity: 0.85;
  }
  .ss__reel-screen {
    position: relative;
    aspect-ratio: 24 / 7;
    min-height: 130px;
    overflow: hidden;
    background: #000;
  }
  .ss__reel-thumb {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    transition: transform 600ms var(--ease-out), filter 600ms var(--ease-out);
    filter: brightness(0.55) saturate(0.9);
  }
  .ss__reel.is-playing .ss__reel-thumb {
    filter: brightness(0.85) saturate(1);
    animation: reelKenBurns 14s ease-in-out infinite alternate;
  }
  @keyframes reelKenBurns {
    from { transform: scale(1.04) translate(-1%, 1%); }
    to   { transform: scale(1.12) translate(1.5%, -1%); }
  }
  .ss__reel-vignette {
    position: absolute; inset: 0;
    background:
      linear-gradient(90deg, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.25) 35%, rgba(0,0,0,0.2) 65%, rgba(0,0,0,0.65) 100%),
      linear-gradient(180deg, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0) 50%, rgba(0,0,0,0.45) 100%);
    pointer-events: none;
  }
  .ss__reel-overlay {
    position: absolute; inset: 0;
    padding: 16px 22px 20px;
    display: flex; align-items: stretch; justify-content: space-between;
    gap: 16px;
    z-index: 2;
    color: var(--ink-bright);
  }
  .ss__reel-overlay-l { display: flex; flex-direction: column; gap: 6px; justify-content: center; min-width: 0; flex: 1; }
  .ss__reel-overlay-r { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; gap: 8px; }

  .ss__reel-live {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 9px; letter-spacing: 0.24em; text-transform: uppercase;
    font-weight: 600;
    color: var(--ink-bright);
    width: fit-content;
    white-space: nowrap;
  }
  .ss__reel-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(245,241,234,0.35);
    transition: background 200ms;
  }
  .ss__reel-dot.is-on {
    background: var(--ember);
    box-shadow: 0 0 0 0 rgba(226,88,34,0.6);
    animation: pulse 1.6s ease-out infinite;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(226,88,34,0.7); }
    100% { box-shadow: 0 0 0 8px rgba(226,88,34,0); }
  }
  .ss__reel-title {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 22px;
    line-height: 1.15;
    color: var(--ink-bright);
    letter-spacing: -0.005em;
    max-width: 480px;
    text-shadow: 0 1px 12px rgba(0,0,0,0.5);
  }
  .ss__reel-creator {
    font-size: 11px;
    color: rgba(245,241,234,0.78);
    letter-spacing: 0.06em;
    font-weight: 500;
  }
  .ss__reel-time {
    font-family: 'Inter', sans-serif;
    font-variant-numeric: tabular-nums;
    font-size: 12px;
    letter-spacing: 0.06em;
    color: var(--ink-bright);
    font-weight: 500;
  }
  .ss__reel-elapsed { color: var(--ember); }
  .ss__reel-total { opacity: 0.55; }
  .ss__reel-play-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(245,241,234,0.95);
    color: var(--ink-deep);
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 13px;
    padding-left: 3px;
  }

  .ss__reel-progress {
    position: absolute; left: 0; right: 0; bottom: 0;
    height: 2px;
    background: rgba(245,241,234,0.15);
    overflow: hidden;
    z-index: 3;
  }
  .ss__reel-progress-bar {
    height: 100%;
    background: var(--ember);
    transition: width 1s linear;
  }
  .ss__reel-cap {
    margin: 10px 0 0;

  /* Accreditations — old standalone box (deprecated, replaced by .ss__attr) */

  .ss__inspired {

  .ss__creators {

  .ss__concierge-role { font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-soft); }

  /* ===================================================================
     FLIPBOOK (LOOKBOOK MODE)
     =================================================================== */
  .fb {
    height: 100vh;
    padding-top: 76px;
    padding-bottom: 90px;
    background:
      radial-gradient(ellipse 70% 55% at 50% 22%, rgba(168, 132, 91, 0.10) 0%, transparent 70%),
      radial-gradient(ellipse 55% 40% at 50% 100%, rgba(178, 62, 20, 0.07) 0%, transparent 70%),
      radial-gradient(ellipse 100% 100% at 50% 50%, #1A1510 0%, #0E0B08 100%);
    color: var(--ink-bright);
    position: relative;
    overflow: hidden;
  }
  /* film-grain texture */
  .fb::before {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 1;
    opacity: 0.22;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='220' height='220'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.55  0 0 0 0 0.45  0 0 0 0 0.35  0 0 0 1 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  }
  /* edge vignette + hairline horizon */
  .fb::after {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      radial-gradient(ellipse 80% 75% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);
  }
  .fb__stage, .fb__controls { position: relative; z-index: 2; }
  .fb__stage {
    height: 100%;
    perspective: 2400px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 40px;
  }
  /* The book sits in a warm pool of light — strengthen its shadow */
  .fb__spread {
    box-shadow:
      0 40px 100px rgba(0,0,0,0.7),
      0 16px 40px rgba(0,0,0,0.45),
      0 0 0 1px rgba(0,0,0,0.4),
      0 0 80px rgba(168, 132, 91, 0.08);
  }
  .fb__book {
    position: relative;
    width: min(1180px, 96vw);
    height: 100%;
    transform-style: preserve-3d;
  }
  .fb__spread {
    position: absolute;
    inset: 0;
    background: var(--paper-cream);
    transform-origin: left center;
    transform: rotateY(0deg);
    transition: transform 900ms var(--ease-curl), opacity 600ms var(--ease-out);
    backface-visibility: hidden;
  }
  .fb__spread.is-past {
    transform: rotateY(-180deg) translateZ(2px);
    pointer-events: none;
  }
  .fb__spread.is-future {
    transform: rotateY(0deg);
    opacity: 1;
  }
  /* The "next" spread should be visible behind, current spread sits on top */
  .fb__spread.is-current { z-index: 20 !important; }

  .fb__edge {
    position: absolute;
    top: 0; bottom: 0;
    width: 80px;
    z-index: 50;
    display: flex; align-items: center; justify-content: center;
    color: rgba(245,241,234,0.4);
    font-size: 32px;
    font-family: 'Fraunces', serif;
    cursor: pointer;
    transition: color 250ms, background 250ms;
  }
  .fb__edge:hover { color: var(--ink-bright); background: linear-gradient(90deg, rgba(245,241,234,0.06), transparent); }
  .fb__edge--right:hover { background: linear-gradient(270deg, rgba(245,241,234,0.06), transparent); }
  .fb__edge--left { left: 0; }
  .fb__edge--right { right: 0; }

  .fb__controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    padding: 20px 32px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, transparent, rgba(0,0,0,0.6));
    color: var(--ink-soft);
    z-index: 60;
  }
  .fb__page-num { display: inline-flex; align-items: baseline; }
  .fb__dots { display: inline-flex; gap: 6px; align-items: center; }
  .fb__dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(245,241,234,0.25);
    border: none;
    padding: 0;
    cursor: pointer;
    transition: background 200ms, transform 200ms;
  }
  .fb__dot:hover { background: rgba(245,241,234,0.55); }
  .fb__dot.is-active { background: var(--ember); transform: scale(1.5); }
  .fb__hint { font-size: 10px; letter-spacing: 0.24em; text-transform: uppercase; color: rgba(245,241,234,0.4); }

  /* spread pages */
  .fb-page {
    position: absolute; inset: 0;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  .fb-page--paper {
    background: var(--paper-cream);
    color: var(--ink-deep);
  }
  .fb-page__inner {
    flex: 1;
    padding: 56px 80px;
    overflow: auto;
  }
  .fb__pnum {
    position: absolute;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Fraunces', serif;
    font-size: 12px;
    color: var(--ink-muted);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.1em;
  }

  /* Cover */
  .fb-page--cover { background: var(--canvas-deep); }
  .fb-cover__photo {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
    animation: kenBurns 20s ease-in-out infinite alternate;
  }
  .fb-cover__scrim {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(15,14,12,0.55) 0%, rgba(15,14,12,0) 25%, rgba(15,14,12,0) 60%, rgba(15,14,12,0.85) 100%);
  }
  .fb-cover__masthead {
    position: relative;
    color: rgba(245,241,234,0.7);
    font-size: 10px;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    text-align: center;
    padding: 36px 0;
    z-index: 2;
  }
  .fb-cover__center {
    position: relative;
    z-index: 2;
    flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
    padding: 0 48px;
  }
  .fb-cover__title {
    color: var(--ink-bright);
    font-size: clamp(56px, 8vw, 96px);
    margin: 0;
    letter-spacing: 0.04em;
    line-height: 1.05;
  }
  .fb-cover__sub {
    margin-top: 24px;
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--ink-bright);
    opacity: 0.85;
    font-size: clamp(16px, 1.6vw, 20px);
  }
  .fb-cover__byline {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(245,241,234,0.75);
  }
  .fb-cover__byline em { color: var(--ink-bright); font-style: normal; }
  .fb-cover__foot {
    position: relative;
    z-index: 2;
    padding: 24px 48px;
    text-align: center;
  }

  /* Prelude */
  .fb-prelude { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; height: 100%; }
  .fb-prelude__quote {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(32px, 4.2vw, 52px);
    line-height: 1.25;
    color: var(--ink-deep);
    margin: 0 0 56px;
    max-width: 720px;
    letter-spacing: -0.01em;
  }
  .fb-prelude__body {
    max-width: 540px;
    text-align: left;
  }
  .fb-prelude__terminator {
    color: var(--ember-stamp);
    font-size: 24px;
    margin-top: 56px;
    font-family: 'Fraunces', serif;
  }

  /* Day spread */
  .fb-day__head { display: flex; align-items: flex-start; gap: 24px; margin-bottom: 32px; }
  .fb-day__ord { font-size: 80px; }
  .fb-day__head-right { flex: 1; padding-top: 16px; }
  .fb-day__title { margin: 0; line-height: 1.0; }
  .fb-day__sub {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: var(--ink-muted);
    font-size: 22px;
    margin: 6px 0 28px;
  }
  .fb-day__photo-wrap {
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .fb-day__photo {
    width: 100%; height: 100%;
    background-size: cover; background-position: center;
  }
  .fb-day__cap { margin-bottom: 32px; color: var(--ink-muted); }
  .fb-day__cols {
    display: grid;
    grid-template-columns: 1.6fr 1fr;
    gap: 48px;
  }
  .fb-day__lodge { border-left: 0.5px solid var(--divider-light); padding-left: 32px; }
  .fb-day__lodge-name {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    color: var(--ink-deep);
    margin: 0 0 4px;
  }
  .fb-day__inspired {
    display: flex; gap: 12px; align-items: flex-start;
    font-size: 13px;
    color: var(--ink-body);
    line-height: 1.4;
  }
  .fb-day__inspired strong { color: var(--ember-stamp); }
  .fb-day__play { color: var(--ember-stamp); font-size: 10px; margin-top: 6px; }

  /* Inspirations */
  .fb-insp__grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 32px;
  }
  .fb-insp__creator { display: flex; flex-direction: column; }
  .fb-insp__avatar {
    width: 80px; height: 80px; border-radius: 50%;
    background-size: cover; background-position: center;
    margin-bottom: 16px;
  }
  .fb-insp__name { font-family: 'Fraunces', serif; font-size: 22px; color: var(--ink-deep); margin-bottom: 4px; }
  .fb-insp__contrib {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-body);
    margin-top: 8px;
    line-height: 1.4;
  }
  .fb-insp__source-row {
    display: flex; align-items: center; gap: 16px;
    padding: 12px 0;
    border-bottom: 0.5px solid var(--divider-light);
  }
  .fb-insp__source-row:last-child { border-bottom: none; }

  /* Make it yours */
  .fb-make { text-align: center; display: flex; flex-direction: column; align-items: center; padding-top: 32px; }
  .fb-make__quote {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(28px, 3.6vw, 44px);
    line-height: 1.25;
    color: var(--ink-deep);
    margin: 0 0 56px;
    letter-spacing: -0.01em;
  }
  .fb-make__concierge { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 32px; }
  .fb-make__avatar {
    width: 80px; height: 80px; border-radius: 50%;
    background-size: cover; background-position: center;
    margin-bottom: 8px;
  }
  .fb-make__c-name { font-family: 'Fraunces', serif; font-size: 22px; color: var(--ink-deep); }
  .fb-make__c-quote {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 18px;
    color: var(--ink-body);
    max-width: 480px;
    margin: 0 auto 40px;
    line-height: 1.5;
  }
  .fb-make__cta-row { margin-bottom: 16px; }
  .fb-make__secondary {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-muted);
    text-decoration: none;
  }
  .fb-make__org { display: flex; gap: 20px; align-items: center; text-align: left; }
  .fb-make__org-line { font-family: 'Fraunces', serif; font-size: 18px; color: var(--ink-deep); }

  /* Back cover */
  .fb-page--back {
    background: var(--canvas-deep);
    color: var(--ink-bright);
    align-items: center; justify-content: center;
    display: flex;
  }
  .fb-back__inner { text-align: center; padding: 48px; }

  /* ===================================================================
     ATLAS-POSTER (POSTER MODE)
     =================================================================== */
  .ap-stage {
    display: grid;
    grid-template-columns: 320px 1fr;
    gap: 48px;
    padding: 116px 48px 64px;
    align-items: start;
    min-height: 100vh;
    background: var(--canvas-night);
    color: var(--ink-bright);
  }
  .ap__sidebar {
    position: sticky; top: 116px;
    padding: 28px;
    border: 1px solid var(--divider-dark);
    background: rgba(245,241,234,0.04);
    color: var(--ink-soft);
  }
  .ap__sidebar .eyebrow.eyebrow--muted { color: var(--ink-soft); }
  .ap__sidebar .display { color: var(--ink-bright); }
  .ap__sidebar .caption { color: var(--ink-soft); }
  .ap__outputs { display: flex; flex-direction: column; gap: 10px; }
  .ap__output {
    display: flex; gap: 16px; align-items: center;
    font-size: 12px;
    padding: 6px 0;
  }
  .ap__output-ratio {
    font-family: 'Fraunces', serif;
    font-size: 14px;
    color: var(--ember);
    width: 56px;
    font-variant-numeric: tabular-nums;
  }
  .ap__output-name { color: var(--ink-soft); }

  .ap__poster-wrap {
    display: flex; align-items: flex-start; justify-content: center;
    padding: 0 24px 24px;
  }
  .ap-poster {
    width: 100%;
    max-width: 720px;
    aspect-ratio: 2 / 3;
    background: var(--paper-cream);
    color: var(--ink-deep);

  }
  .ap-poster__frame {
    position: relative;
    inset: 16px;
    margin: 16px;
    height: calc(100% - 32px);
    border: 1px solid var(--acacia-rule);
    padding: 24px 28px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .ap-poster.is-vintage .ap-poster__frame {
    border: 1px solid var(--ember-stamp);
    box-shadow: inset 0 0 0 3px var(--paper-aged), inset 0 0 0 4px var(--ember-stamp);
  }

  .ap-poster__masthead {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--ember-stamp);
  }
  .ap-poster__mast-l { text-align: left; }
  .ap-poster__mast-c { font-family: 'Fraunces', serif; font-style: italic; font-weight: 300; font-size: 13px; text-transform: none; letter-spacing: 0.02em; color: var(--ink-body); }
  .ap-poster__mast-r { text-align: right; }

  .ap-poster__title-row {
    display: flex; align-items: flex-end; justify-content: space-between;
    margin: 18px 0 14px;
    gap: 16px;
  }
  .ap-poster__title {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(38px, 6vw, 64px);
    letter-spacing: 0.08em;
    line-height: 0.95;
    margin: 0;
    color: var(--ink-deep);
    text-transform: uppercase;
  }
  .ap-poster.is-vintage .ap-poster__title { letter-spacing: 0.1em; }
  .ap-poster__title-side { text-align: right; max-width: 180px; }
  .ap-poster__sub {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-body);
    margin-top: 4px;
  }

  .ap-poster__hero {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 11;
    overflow: hidden;
    margin: 4px 0 10px;
  }
  .ap-poster__hero-photo {
    position: absolute; inset: 0;
    background-size: cover; background-position: center;
  }
  .ap-poster.is-vintage .ap-poster__hero-photo {
    filter: sepia(0.18) saturate(0.85) contrast(0.95) brightness(0.96);
  }
  .ap-poster__lut {
    position: absolute; inset: 0;
    background: linear-gradient(180deg, rgba(178, 62, 20, 0.08), rgba(201, 166, 107, 0.12));
    mix-blend-mode: multiply;
    pointer-events: none;
  }
